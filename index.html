<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>English For You</title>
  <style>
    :root {
      --bg: #1a1a2e; --bg-mid: #16213e; --bg-end: #0f3460;
      --card: rgba(255, 255, 255, 0.08); 
      --accent1: #e94560; --accent2: #ff7eb3;
      --glass: rgba(255, 255, 255, 0.1); 
      --success: #10b981;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color-scheme: dark;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg), var(--bg-mid), var(--bg-end));
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(10px, 3vw, 20px);
    }
    .app { 
      width: 100%; max-width: 1000px; 
      display: grid; grid-template-columns: 300px 1fr; gap: clamp(15px, 3vw, 20px); 
    }
    .panel { 
      background: var(--card); backdrop-filter: blur(10px); 
      border-radius: 20px; padding: clamp(20px, 5vw, 30px); 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    }
    header { grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .title { font-size: clamp(20px, 5vw, 24px); font-weight: 800; color: var(--accent2); text-align: center; }
    
    .btn { 
      background: var(--glass); border: none; padding: 12px 20px; 
      border-radius: 12px; color: #fff; cursor: pointer; 
      font-weight: bold; font-size: clamp(14px, 4vw, 16px); transition: 0.2s; 
      display: flex; justify-content: center; align-items: center;
    }
    .btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    .btn.primary { background: linear-gradient(90deg, var(--accent1), var(--accent2)); }
    .btn.danger { background: rgba(233, 69, 96, 0.3); border: 1px solid var(--accent1); }
    .btn.danger:hover { background: var(--accent1); }
    
    .avatar { 
      width: clamp(80px, 20vw, 100px); height: clamp(80px, 20vw, 100px); border-radius: 50%; margin: 0 auto 15px; 
      background: url('https://api.dicebear.com/7.x/notionists/svg?seed=love') center/cover; 
      border: 4px solid var(--accent2);
    }
    .stats { display: flex; justify-content: space-around; gap: 10px; margin: 20px 0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px;}
    .stat-num { font-size: clamp(20px, 5vw, 24px); font-weight: bold; color: var(--accent2); }
    
    .progress-bar { height: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent2); width: 0%; transition: 0.5s; }

    .focus-mode { text-align: center; padding: 10px 0; min-height: 250px; display: flex; flex-direction: column; justify-content: center;}
    .focus-word { font-size: clamp(36px, 10vw, 56px); font-weight: 900; margin-bottom: 10px; color: var(--accent2); word-break: break-word; line-height: 1.1;}
    .focus-meaning { font-size: clamp(20px, 6vw, 24px); color: #ccc; margin-bottom: 15px; }
    .secret-hint { font-size: clamp(14px, 4vw, 16px); color: var(--accent2); font-style: italic; margin-bottom: 30px; display: none; min-height: 20px;}
    
    .focus-input { 
      width: 100%; max-width: 400px; padding: 15px; font-size: 16px; border-radius: 12px; 
      border: 2px solid rgba(255,255,255,0.2); background: transparent; 
      color: white; text-align: center; outline: none; margin: 0 auto 20px auto;
      display: none;
    }
    .focus-input:focus { border-color: var(--accent2); }
    
    .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; width: 100%; max-width: 400px; margin: 0 auto;}
    .controls .btn { flex: 1; min-width: 140px; }
    
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 350px; text-align: center; background: rgba(0,0,0,0.9); padding: 15px 20px; border-radius: 12px; color: white; opacity: 0; transition: 0.3s; font-size: 15px; pointer-events: none; z-index: 999; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); padding: 20px;}
    .modal-box { background: var(--bg-mid); padding: clamp(25px, 6vw, 40px); border-radius: 20px; text-align: center; border: 2px solid var(--accent2); width: 100%; max-width: 400px;}
    
    #loginInput {
      width: 100%; padding: 15px; font-size: 16px; border-radius: 12px; 
      border: 2px solid var(--accent2); background: transparent; 
      color: white; text-align: center; outline: none; margin-bottom: 20px;
    }

    /* Tối ưu riêng cho các dòng màn hình điện thoại */
    @media(max-width: 800px) { 
      .app { grid-template-columns: 1fr; } 
    }
    @media(max-width: 480px) {
      header { flex-direction: column; justify-content: center; }
      header .btn { width: 100%; }
      .controls { flex-direction: column; }
      .controls .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="modal" id="loginScreen">
    <div class="modal-box">
      <h2 style="color: var(--accent2); margin-bottom: 10px;">Chào mừng bạn</h2>
      <p style="color: #ccc; margin-bottom: 25px;">Vui lòng nhập tên để bắt đầu học</p>
      <input type="text" id="loginInput" placeholder="Tên của bạn là gì?" autocomplete="off">
      <button class="btn primary" id="btnLogin" style="width: 100%;">Bắt đầu ngay</button>
    </div>
  </div>

  <div class="app" id="mainApp" style="opacity: 0; pointer-events: none; transition: 0.5s;">
    <header class="panel">
      <div class="title" id="headerTitle">Góc Học Tập</div>
      <button class="btn primary" id="btnCheckin">Điểm danh</button>
    </header>

    <aside class="panel" style="text-align: center;">
      <div class="avatar" id="userAvatar"></div>
      <h2 style="margin-bottom: 5px;" id="userTitle">Người lạ ơi</h2>
      <div style="font-size: 14px; color: #aaa;" id="xpNextLevel">Học để lên cấp nhé!</div>
      <div class="progress-bar"><div class="progress-fill" id="titleProgress"></div></div>

      <div class="stats">
        <div><div class="stat-num" id="ui-xp">0</div><div style="font-size: 12px;">EXP</div></div>
        <div><div class="stat-num" id="ui-streak">0</div><div style="font-size: 12px;">Ngày</div></div>
      </div>
      <div style="font-size: 16px; font-weight: bold; color: var(--success);" id="queueStatus">Hôm nay còn: 5 từ</div>
    </aside>

    <main class="panel">
      <div class="focus-mode" id="focusMode">
        <div id="finishScreen" style="display: none;">
          <h2 style="font-size: clamp(24px, 6vw, 30px); color: var(--accent2); margin-top: 20px;">Hoàn thành xuất sắc!</h2>
          <p style="font-size: 16px; margin-top: 15px; color: #ccc;">Em đã học hết từ hôm nay. Mai quay lại nhé!</p>
        </div>

        <div id="studyArea">
          <div class="focus-word" id="focusWord">Đang tải...</div>
          <div class="focus-meaning" id="focusMeaning">---</div>
          <div class="secret-hint" id="secretHint"></div>
          
          <input type="text" class="focus-input" id="focusInput" autocomplete="off">
          
          <div class="controls" id="learnControls">
            <button class="btn" onclick="playAudio()">Nghe phát âm</button>
            <button class="btn primary" id="btnStartTest">Đã nhớ, kiểm tra ngay</button>
          </div>

          <div class="controls" id="testControls" style="display: none;">
            <button class="btn danger" id="btnGiveUp">Bỏ cuộc (-20 EXP)</button>
            <button class="btn primary" id="btnCheck">Kiểm tra đáp án</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="levelModal">
    <div class="modal-box">
      <h2 style="color: var(--accent2); margin-bottom: 10px;">Danh hiệu mới!</h2>
      <h3 id="modalTitleName" style="margin-bottom: 15px;">---</h3>
      <p id="modalMessage" style="margin-bottom: 25px; font-size: 16px; color: #ccc;">---</p>
      <button class="btn primary" onclick="document.getElementById('levelModal').style.display='none'" style="width: 100%;">Tiếp tục học thôi</button>
    </div>
  </div>

  "Snow|Tuyết","Cloud|Đám mây","Sky|Bầu trời","Star|Ngôi sao","Morning|Buổi sáng",
  "Afternoon|Buổi chiều","Evening|Buổi tối","Night|Ban đêm","Week|Tuần","Month|Tháng",
  "Year|Năm","Today|Hôm nay","Tomorrow|Ngày mai","Yesterday|Hôm qua","Always|Luôn luôn",
  "Never|Không bao giờ","Often|Thường xuyên","Sometimes|Đôi khi","Rarely|Hiếm khi","Usually|Thông thường",
  "Early|Sớm","Late|Muộn","Soon|Sớm thôi","Once|Một lần","Twice|Hai lần",
  "Again|Lần nữa","Before|Trước khi","After|Sau khi","During|Trong suốt","While|Trong khi",

  // --- ĐỒ VẬT & MÓN ĂN QUEN THUỘC ---
  "Bread|Bánh mì","Butter|Bơ","Cheese|Phô mai","Chicken|Thịt gà","Coffee|Cà phê",
  "Dinner|Bữa tối","Fruit|Trái cây","Garlic|Tỏi","Honey|Mật ong","Juice|Nước ép",
  "Kitchen|Nhà bếp","Lemon|Quả chanh","Meat|Thịt","Milk|Sữa","Onion|Hành tây",
  "Orange|Quả cam","Pepper|Hạt tiêu","Potato|Khoai tây","Recipe|Công thức nấu ăn","Rice|Gạo/Cơm",
  "Salad|Rau trộn","Salt|Muối","Sandwich|Bánh mì kẹp","Sauce|Nước sốt","Soup|Món súp",
  "Sugar|Đường (ăn)","Sweet|Ngọt ngào/Kẹo","Tomato|Cà chua","Vegetable|Rau củ","Water|Nước",
  "Window|Cửa sổ","Door|Cửa ra vào","Table|Cái bàn","Chair|Cái ghế","Bed|Cái giường",

  // --- BỘ TỪ VỰNG "MẬT NGỌT" DÀNH CHO CRUSH ---
  "Affection|Sự yêu thương","Allure|Sức quyến rũ","Angelic|Tựa thiên thần","Beloved|Người yêu dấu","Blossom|Nở rộ",
  "Captivate|Làm say đắm","Charm|Sự duyên dáng","Companion|Người đồng hành","Cuddle|Ôm ấp","Darling|Người thương",
  "Dazzling|Sáng chói/Lộng lẫy","Devotion|Sự tận tâm","Embrace|Cái ôm","Enchant|Bỏ bùa mê","Endear|Làm cho được yêu mến",
  "Eternity|Sự vĩnh cửu","Fancy|Say mê/Thích","Flirt|Tán tỉnh","Fondness|Sự yêu mến","Gentle|Dịu dàng",
  "Heartthrob|Người trong mộng","Infatuate|Làm đắm say","Intimate|Thân mật","Kiss|Nụ hôn","Lovable|Đáng yêu",
  "Lullaby|Khúc hát ru","Magic|Phép màu/Kỳ diệu","Melody|Giai điệu","Muse|Nàng thơ","Passion|Niềm đam mê",
  "Precious|Quý giá","Promise|Lời hứa","Radiant|Rạng rỡ","Romance|Sự lãng mạn","Rose|Hoa hồng",
  "Serenade|Bản tình ca","Soulmate|Bạn tâm giao","Sparkle|Lấp lánh","Stunning|Đẹp sững sờ","Sweetheart|Người yêu",
  "Tender|Mềm mại/Dịu dàng","Treasure|Kho báu/Trân quý","Valentine|Người tình","Whisper|Lời thì thầm","Wonderful|Tuyệt vời",
  "Yearn|Khao khát","Zeal|Sự nhiệt huyết","Mesmerize|Mê hoặc","Breathtaking|Đẹp ngộp thở","Forever|Mãi mãi"
];

const VOCAB_DB = RAW_VOCAB.map(str => {
  let parts = str.split('|');
  return { w: parts[0], m: parts[1] };
});

let state = JSON.parse(localStorage.getItem('crush_app')) || { 
  userName: '', isCrush: false,
  xp: 0, streak: 0, lastCheckin: null, 
  words: VOCAB_DB.map((v,i)=>({id:i, ...v, nextTs:0, step:0})), 
  queue: [], titleIdx: 0 
};

let testDirection = 'en-vi'; 
let currentWordAudio = '';   

if(state.words.length < VOCAB_DB.length) {
  for(let i = state.words.length; i < VOCAB_DB.length; i++) {
    state.words.push({id: i, ...VOCAB_DB[i], nextTs:0, step:0});
  }
}

function checkLogin() {
  if (state.userName) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.opacity = '1';
    document.getElementById('mainApp').style.pointerEvents = 'auto';
    document.getElementById('headerTitle').innerText = state.isCrush ? "Góc của Yến Ngọc" : "Góc Học Tập";
    initQueue();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
  }
}

document.getElementById('btnLogin').onclick = () => {
  let name = document.getElementById('loginInput').value.trim();
  if(!name) return showToast('Nhập tên để bắt đầu nhé!');
  
  state.userName = name;
  let normalized = name.toLowerCase();
  state.isCrush = (normalized === 'yến ngọc' || normalized === 'yen ngoc');
  save();
  checkLogin();
  showToast(`Chào mừng ${name} đến với hệ thống!`);
};

document.getElementById('loginInput').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') document.getElementById('btnLogin').click();
});

function save() { localStorage.setItem('crush_app', JSON.stringify(state)); updateUI(); }

function initQueue() {
  if (state.queue.length === 0) {
    let due = state.words.filter(w => w.nextTs <= Date.now()).sort(()=>0.5 - Math.random()).slice(0, 5);
    state.queue = due.map(w => w.id);
  }
  save(); loadWord(); 
}

function updateUI() {
  document.getElementById('ui-xp').innerText = state.xp;
  document.getElementById('ui-streak').innerText = state.streak;
  document.getElementById('queueStatus').innerText = state.queue.length > 0 ? `Hôm nay còn: ${state.queue.length} từ` : `Đã hoàn thành!`;
  
  // Xử lý thay đổi Avatar nếu là Yến Ngọc
  if (state.isCrush) {
    document.getElementById('userAvatar').style.backgroundImage = "url('img1.jpg')"; // Nếu đuôi ảnh khác, hãy đổi chữ .jpg
  } else {
    document.getElementById('userAvatar').style.backgroundImage = "url('https://api.dicebear.com/7.x/notionists/svg?seed=love')";
  }

  // Chỉ nâng cấp danh hiệu và hiện tiến trình nếu là Yến Ngọc
  if (state.isCrush) {
    let newIdx = 0;
    for(let i=TITLES.length-1; i>=0; i--) { if(state.xp >= TITLES[i].reqXp) { newIdx = i; break; } }
    state.titleIdx = newIdx;

    let curT = TITLES[state.titleIdx], nextT = TITLES[state.titleIdx + 1];
    document.getElementById('userTitle').innerText = curT.name;
    
    if(nextT) {
      document.getElementById('xpNextLevel').innerText = `Cần ${nextT.reqXp - state.xp} EXP để lên cấp`;
      document.getElementById('titleProgress').style.width = Math.min(100, ((state.xp - curT.reqXp)/(nextT.reqXp - curT.reqXp))*100) + '%';
    } else {
      document.getElementById('xpNextLevel').innerText = 'Cấp tối đa!';
      document.getElementById('titleProgress').style.width = '100%';
    }
  } else {
    // Nếu là người khác
    document.getElementById('userTitle').innerText = "Học viên chăm chỉ";
    document.getElementById('xpNextLevel').innerText = "Chế độ danh hiệu đang ẩn";
    document.getElementById('titleProgress').style.width = '100%';
  }

  if(state.queue.length === 0) {
    document.getElementById('studyArea').style.display = 'none';
    document.getElementById('finishScreen').style.display = 'block';
  } else {
    document.getElementById('studyArea').style.display = 'block';
    document.getElementById('finishScreen').style.display = 'none';
  }
}

function checkLevelUp(oldXp, newXp) {
  if (!state.isCrush) return; // Không hiển thị thông báo lên cấp cho người ngoài

  let oldIdx = 0, newIdx = 0;
  for(let i=TITLES.length-1; i>=0; i--) { if(oldXp >= TITLES[i].reqXp) { oldIdx = i; break; } }
  for(let i=TITLES.length-1; i>=0; i--) { if(newXp >= TITLES[i].reqXp) { newIdx = i; break; } }
  
  if(newIdx > oldIdx) {
    document.getElementById('modalTitleName').innerText = TITLES[newIdx].name;
    document.getElementById('modalMessage').innerText = TITLES[newIdx].msg;
    document.getElementById('levelModal').style.display = 'flex';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2500);
}

function loadWord() {
  if(state.queue.length === 0) return;
  const w = state.words.find(x => x.id === state.queue[0]);
  
  currentWordAudio = w.w; 
  document.getElementById('focusWord').innerText = w.w;
  document.getElementById('focusMeaning').innerText = w.m;
  
  if (state.isCrush) {
    const randomHint = SECRET_HINTS[Math.floor(Math.random() * SECRET_HINTS.length)];
    document.getElementById('secretHint').innerText = randomHint;
    document.getElementById('secretHint').style.display = 'block';
  } else {
    document.getElementById('secretHint').style.display = 'none';
  }

  document.getElementById('focusInput').style.display = 'none';
  document.getElementById('learnControls').style.display = 'flex';
  document.getElementById('testControls').style.display = 'none';
}

document.getElementById('btnStartTest').onclick = () => {
  const w = state.words.find(x => x.id === state.queue[0]);
  testDirection = Math.random() > 0.5 ? 'en-vi' : 'vi-en'; 

  if (testDirection === 'en-vi') {
    document.getElementById('focusWord').innerText = w.w;
    document.getElementById('focusMeaning').innerText = '...';
    document.getElementById('focusInput').placeholder = 'Gõ nghĩa tiếng Việt...';
  } else {
    document.getElementById('focusWord').innerText = '...';
    document.getElementById('focusMeaning').innerText = w.m;
    document.getElementById('focusInput').placeholder = 'Gõ từ tiếng Anh...';
  }
  
  document.getElementById('secretHint').style.display = 'none'; 
  document.getElementById('focusInput').value = '';
  document.getElementById('focusInput').style.display = 'block';
  document.getElementById('learnControls').style.display = 'none';
  document.getElementById('testControls').style.display = 'flex';
  document.getElementById('focusInput').focus();
};

document.getElementById('btnGiveUp').onclick = () => {
  let oldXp = state.xp;
  state.xp = Math.max(0, state.xp - 20); 
  showToast('Không sao, học lại nhé! -20 EXP');
  save(); 
  loadWord(); 
};

document.getElementById('btnCheck').onclick = () => {
  const w = state.words.find(x => x.id === state.queue[0]);
  let input = document.getElementById('focusInput').value.trim().toLowerCase();
  let target = testDirection === 'en-vi' ? w.m.toLowerCase() : w.w.toLowerCase();

  if(input === target) markCorrect();
  else showToast('Sai mất rồi, thử lại nhé!');
};

document.getElementById('focusInput').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') document.getElementById('btnCheck').click();
});

function markCorrect() {
  const w = state.words.find(x => x.id === state.queue[0]);
  w.step++; w.nextTs = Date.now() + ([1,3,7,14][Math.min(w.step, 3)] * 86400000);
  state.queue.shift(); 
  
  let oldXp = state.xp;
  state.xp += 20;
  showToast('Chính xác! +20 EXP');
  
  checkLevelUp(oldXp, state.xp); 
  save(); 
  loadWord(); 
}

function playAudio() {
  if ('speechSynthesis' in window) {
    let u = new SpeechSynthesisUtterance(currentWordAudio);
    u.lang = 'en-US'; 
    window.speechSynthesis.speak(u);
  } else {
    showToast('Trình duyệt không hỗ trợ đọc âm thanh');
  }
}

document.getElementById('btnCheckin').onclick = () => {
  const today = new Date().toDateString();
  if(state.lastCheckin === today) return showToast('Hôm nay điểm danh rồi nha!');
  
  let oldXp = state.xp;
  state.lastCheckin = today; state.streak++; state.xp += 10;
  showToast('Điểm danh thành công! +10 EXP'); 
  checkLevelUp(oldXp, state.xp); 
  save();
};

checkLogin();
</script>
</body>
</html>
